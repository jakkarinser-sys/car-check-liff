<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสภาพรถ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #f0f4f8; color: #1a202c; }

  .header {
    background: linear-gradient(135deg, #00b900, #00d000);
    color: white; padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,185,0,0.3);
  }
  .header-icon { font-size: 28px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.85; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .card {
    background: white; border-radius: 12px; padding: 16px;
    margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card-title {
    font-size: 14px; font-weight: 700; color: #2d3748;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 2px solid #e8f5e9;
    display: flex; align-items: center; gap: 6px;
  }

  .field { margin-bottom: 12px; }
  label { font-size: 13px; color: #4a5568; font-weight: 600; display: block; margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0;
    border-radius: 8px; font-size: 14px; color: #2d3748;
    transition: border 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #00b900;
  }

  .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-item {
    border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px;
    transition: all 0.2s; cursor: pointer; position: relative;
    background: #fafafa;
  }
  .check-item.ok { border-color: #00b900; background: #f0fff0; }
  .check-item.not-ok { border-color: #e53e3e; background: #fff5f5; }

  .check-item input[type=radio] { display: none; }
  .item-name { font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }

  .radio-group { display: flex; gap: 6px; }
  .radio-btn {
    flex: 1; text-align: center; padding: 5px 0;
    border-radius: 6px; font-size: 12px; font-weight: 700;
    border: 1.5px solid #e2e8f0; background: white; cursor: pointer;
    transition: all 0.15s;
  }
  .radio-btn.selected-ok { background: #00b900; color: white; border-color: #00b900; }
  .radio-btn.selected-bad { background: #e53e3e; color: white; border-color: #e53e3e; }

  .badge {
    position: absolute; top: 6px; right: 6px;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .badge-ok { background: #00b900; color: white; }
  .badge-bad { background: #e53e3e; color: white; }

  .progress-bar {
    background: #e2e8f0; border-radius: 99px; height: 6px; margin: 8px 0 4px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: #00b900; border-radius: 99px; transition: width 0.3s; }
  .progress-text { font-size: 11px; color: #718096; text-align: right; }

  .btn-submit {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #00b900, #00d000);
    color: white; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer;
    margin-top: 8px; margin-bottom: 20px;
    box-shadow: 0 4px 12px rgba(0,185,0,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled { background: #a0aec0; box-shadow: none; cursor: not-allowed; }

  .summary-count {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .count-badge {
    flex: 1; text-align: center; padding: 8px;
    border-radius: 8px; font-size: 12px;
  }
  .count-ok { background: #f0fff0; color: #276749; border: 1px solid #c6f6d5; }
  .count-bad { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
  .count-pending { background: #fffbeb; color: #b7791f; border: 1px solid #fefcbf; }
  .count-num { font-size: 22px; font-weight: 800; display: block; }

  /* Result overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.active { display: flex; }
  .result-card {
    background: white; border-radius: 16px; padding: 20px;
    width: 100%; max-width: 360px; text-align: center;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-icon { font-size: 48px; margin-bottom: 8px; }
  .result-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .result-sub { font-size: 13px; color: #718096; margin-bottom: 16px; }
  .btn-close {
    width: 100%; padding: 12px; background: #00b900;
    color: white; font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🚗</div>
  <div>
    <h1>ตรวจสภาพรถประจำวัน</h1>
    <p id="dateDisplay">กำลังโหลด...</p>
  </div>
</div>

<div class="container">

  <!-- ข้อมูลพนักงาน -->
  <div class="card">
    <div class="card-title">👤 ข้อมูลผู้ตรวจ</div>
    <div class="field">
      <label>พนักงาน *</label>
      <select id="driverName">
        <option value="">-- เลือกพนักงาน --</option>
        <option value="65035 นายแดน จุลหอม">65035 — นายแดน จุลหอม</option>
        <option value="66024 นายพันตรี บุญทศ">66024 — นายพันตรี บุญทศ</option>
        <option value="60038 นายอัษฎา บ่อกลาง">60038 — นายอัษฎา บ่อกลาง</option>
        <option value="63048 นายอรรณพ อินทุภูติ">63048 — นายอรรณพ อินทุภูติ</option>
        <option value="65011 นายกรุงทอง กิ่งมณี">65011 — นายกรุงทอง กิ่งมณี</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field">
        <label>ทะเบียนรถ *</label>
        <select id="licensePlate">
          <option value="">-- เลือกทะเบียน --</option>
          <option value="84-3935">84-3935</option>
          <option value="84-5098">84-5098</option>
          <option value="84-5099">84-5099</option>
          <option value="83-9993/94">83-9993/94</option>
          <option value="84-7019/20">84-7019/20</option>
        </select>
      </div>
      <div class="field">
        <label>เลขไมล์ (กม.)</label>
        <input type="number" id="mileage" placeholder="เช่น 85000">
      </div>
    </div>
  </div>

  <!-- progress -->
  <div class="card" style="padding:12px 16px">
    <div style="font-size:13px;font-weight:700;color:#4a5568;margin-bottom:6px">📊 ความคืบหน้าการตรวจ</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">ยังไม่ได้ตรวจ 0/16</div>
    <div class="summary-count" style="margin-top:10px">
      <div class="count-badge count-ok"><span class="count-num" id="countOk">0</span>ผ่าน ✅</div>
      <div class="count-badge count-bad"><span class="count-num" id="countBad">0</span>ไม่ผ่าน ❌</div>
      <div class="count-badge count-pending"><span class="count-num" id="countPending">16</span>รอตรวจ</div>
    </div>
  </div>

  <!-- รายการตรวจ -->
  <div id="checkSections"></div>

  <!-- หมายเหตุ -->
  <div class="card">
    <div class="card-title">📝 หมายเหตุเพิ่มเติม</div>
    <textarea id="remark" rows="3" placeholder="ระบุปัญหาหรือข้อสังเกตเพิ่มเติม (ถ้ามี)"></textarea>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitForm()">
    💾 บันทึกและส่งผลการตรวจ
  </button>
</div>

<!-- Result overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">✅</div>
    <div class="result-title" id="resultTitle">บันทึกสำเร็จ!</div>
    <div class="result-sub" id="resultSub">ระบบกำลังส่งผลการตรวจกลับไปใน LINE...</div>
    <button class="btn-close" onclick="document.getElementById('overlay').classList.remove('active')">ปิด</button>
  </div>
</div>

<script>
const SECTIONS = [
  {
    title: "🔆 ระบบไฟและสัญญาณ", icon: "💡",
    items: [
      { id: "light_front", name: "ไฟหน้า", icon: "🔦" },
      { id: "light_back", name: "ไฟท้าย", icon: "🔦" },
      { id: "light_brake", name: "ไฟเบรก", icon: "🔴" },
      { id: "light_signal", name: "ไฟเลี้ยว", icon: "🟡" },
    ]
  },
  {
    title: "🛞 ยางและล้อ", icon: "🛞",
    items: [
      { id: "tire_fl", name: "ยางหน้าซ้าย", icon: "🛞" },
      { id: "tire_fr", name: "ยางหน้าขวา", icon: "🛞" },
      { id: "tire_rl", name: "ยางหลังซ้าย", icon: "🛞" },
      { id: "tire_rr", name: "ยางหลังขวา", icon: "🛞" },
    ]
  },
  {
    title: "⚙️ ระบบเครื่องยนต์", icon: "⚙️",
    items: [
      { id: "engine_oil", name: "น้ำมันเครื่อง", icon: "🛢️" },
      { id: "coolant", name: "น้ำหล่อเย็น", icon: "💧" },
      { id: "battery", name: "แบตเตอรี่", icon: "🔋" },
      { id: "wiper", name: "น้ำฉีดกระจก", icon: "🫧" },
    ]
  },
  {
    title: "🚘 ระบบความปลอดภัย", icon: "🛡️",
    items: [
      { id: "brake", name: "ระบบเบรก", icon: "🔴" },
      { id: "seatbelt", name: "เข็มขัดนิรภัย", icon: "🔒" },
      { id: "mirror", name: "กระจกมองหลัง", icon: "🔲" },
      { id: "horn", name: "แตร", icon: "📢" },
    ]
  }
];

const state = {}; // itemId -> 'ok' | 'bad'
const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);

function buildUI() {
  const container = document.getElementById("checkSections");
  SECTIONS.forEach(sec => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div class="card-title">${sec.title}</div><div class="check-grid" id="grid_${sec.title.replace(/\s/g,'')}"></div>`;
    const grid = card.querySelector(".check-grid");
    sec.items.forEach(item => {
      const el = document.createElement("div");
      el.className = "check-item";
      el.id = `item_${item.id}`;
      el.innerHTML = `
        <div class="item-name">${item.icon} ${item.name}</div>
        <div class="radio-group">
          <div class="radio-btn" id="ok_${item.id}" onclick="setVal('${item.id}','ok',this)">✅ ผ่าน</div>
          <div class="radio-btn" id="bad_${item.id}" onclick="setVal('${item.id}','bad',this)">❌ ไม่ผ่าน</div>
        </div>
      `;
      grid.appendChild(el);
    });
    container.appendChild(card);
  });
}

function setVal(id, val, btn) {
  state[id] = val;
  const okBtn = document.getElementById(`ok_${id}`);
  const badBtn = document.getElementById(`bad_${id}`);
  const item = document.getElementById(`item_${id}`);
  okBtn.className = "radio-btn" + (val === "ok" ? " selected-ok" : "");
  badBtn.className = "radio-btn" + (val === "bad" ? " selected-bad" : "");
  item.className = "check-item " + (val === "ok" ? "ok" : "not-ok");
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(state).length;
  const ok = Object.values(state).filter(v => v === "ok").length;
  const bad = Object.values(state).filter(v => v === "bad").length;
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `ตรวจแล้ว ${done}/${TOTAL} รายการ (${pct}%)`;
  document.getElementById("countOk").textContent = ok;
  document.getElementById("countBad").textContent = bad;
  document.getElementById("countPending").textContent = TOTAL - done;
}

function now() {
  return new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });
}

function submitForm() {
  const name = document.getElementById("driverName").value.trim();
  const plate = document.getElementById("licensePlate").value.trim();
  if (!name || !plate) { alert("กรุณากรอกชื่อพนักงานและทะเบียนรถ"); return; }
  const done = Object.keys(state).length;
  if (done < TOTAL) {
    if (!confirm(`ยังตรวจไม่ครบ (${done}/${TOTAL} รายการ) ต้องการบันทึกต่อไปหรือไม่?`)) return;
  }

  const payload = {
    timestamp: now(),
    driverName: name,
    licensePlate: plate,
    mileage: document.getElementById("mileage").value,
    remark: document.getElementById("remark").value,
    checks: state,
    summary: {
      total: TOTAL,
      ok: Object.values(state).filter(v => v === "ok").length,
      bad: Object.values(state).filter(v => v === "bad").length
    }
  };

  document.getElementById("submitBtn").disabled = true;
  document.getElementById("submitBtn").textContent = "⏳ กำลังบันทึก...";

  // ส่งข้อมูลไป Google Apps Script
const GAS_URL = "https://script.google.com/macros/s/AKfycbxNkd6dXCRW7JTVM14-1e422qdBdZSIF5Oc9kB11KsZAJxr2OvFcOYiKntiq1CSvz8fLg/exec";
  
  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload),
    headers: { "Content-Type": "application/json" }
  })
  .then(r => r.json())
  .then(res => {
    showResult(payload.summary.bad === 0);
  })
  .catch(() => {
    // Demo mode: แสดงผลแม้ไม่มี backend
    showResult(payload.summary.bad === 0);
  });
}

function showResult(passed) {
  document.getElementById("resultIcon").textContent = passed ? "✅" : "⚠️";
  document.getElementById("resultTitle").textContent = passed ? "ผ่านการตรวจ!" : "มีรายการไม่ผ่าน";
  document.getElementById("resultSub").textContent =
    passed
      ? "รถสภาพดี พร้อมออกปฏิบัติงาน ระบบกำลังส่งใบตรวจกลับ LINE..."
      : "กรุณาแจ้งช่างซ่อมก่อนออกรถ ระบบกำลังส่งใบตรวจกลับ LINE...";
  document.getElementById("overlay").classList.add("active");
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").textContent = "💾 บันทึกและส่งผลการตรวจ";
}

// Init
buildUI();
const d = new Date();
document.getElementById("dateDisplay").textContent =
  d.toLocaleDateString("th-TH", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
</script>
</body>
</html>
